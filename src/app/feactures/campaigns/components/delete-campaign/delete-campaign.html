<dialog #dialog class="modal">
  <div class="modal-box w-11/12 max-w-2xl p-0 overflow-hidden">

    <div class="p-5 border-b border-base-200 flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h3 class="text-lg font-bold text-base-content">Eliminar Campaña</h3>
        <p class="text-sm text-base-content/60 mt-0.5">
          Eliminar campaña seleccionada.
        </p>
      </div>

      <div class="shrink-0">
        <span class="badge badge-error badge-outline">Campaigns</span>
      </div>
    </div>

    <div class="p-5">
      <div class="rounded-xl border border-base-200 bg-base-200/40 p-4">
        <div class="flex items-start gap-3">
          <div class="h-10 w-10 rounded-xl bg-error/10 flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-error" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" />
              <path d="M12 9v4" />
              <path d="M12 17h.01" />
            </svg>
          </div>


          <div class="min-w-0">
            <div class="text-sm font-medium text-base-content">Confirmar</div>
            <div class="text-xs text-base-content/60 mt-0.5">
              ¿Estas seguro de eliminar la campaña {{currentCampaign()?.campaign_name}}?<br>
              Verifica primero si la campaña tiene audios, porque el proceso lo eliminará completamente.
            </div>
          </div>
        </div>
      </div>

      <div class="mt-6 flex flex-col-reverse sm:flex-row sm:justify-end gap-2">
        <form method="dialog" class="sm:mr-auto">
          <button class="btn btn-ghost w-full sm:w-auto" (click)="close()">Cancelar</button>
        </form>

        <button class="btn btn-info text-info-content w-full sm:w-auto" type="button" [disabled]="loading()"
          (click)="delete()">
          @if(loading()){
          <span class="inline-flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
              <path d="M17 21v-8H7v8"></path>
              <path d="M7 3v5h8"></path>
            </svg>
            Eliminando...
            <span class="loading loading-spinner"></span>
          </span>
          }@else {
          <span class="inline-flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
              <path d="M17 21v-8H7v8"></path>
              <path d="M7 3v5h8"></path>
            </svg>
            Eliminar
          </span>
          }
        </button>
      </div>
    </div>

  </div>

  <form method="dialog" class="modal-backdrop">
    <button aria-label="Cerrar">close</button>
  </form>
</dialog>
