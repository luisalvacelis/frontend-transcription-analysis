<section class="bg-base-50 min-h-[calc(100vh-9rem)] py-10 px-3 md:px-6">
    <div class="mx-auto max-w-7xl space-y-10">
        <header
            class="rounded-2xl border border-base-200 bg-base-100 p-6 shadow-sm">
            <h1
                class="text-3xl md:text-4xl font-black tracking-tight text-base-content">Prompts</h1>
            <p class="mt-2 max-w-3xl text-base-content/70">
                Registra, revisa y elimina prompts para reutilizarlos en el
                centro de analisis.
            </p>
        </header>

        @if (promptMessage()) {
        <div
            class="alert text-sm"
            [class.alert-error]="promptMessageType() === 'error'"
            [class.alert-success]="promptMessageType() === 'success'">
            {{ promptMessage() }}
        </div>
        }

        <div class="max-w-3xl">
            <app-prompt-manager
                [prompts]="prompts()"
                [newPromptName]="newPromptName()"
                [newPromptText]="newPromptText()"
                [editingPromptId]="editingPromptId()"
                [working]="working()"
                [promptMessage]="''"
                [promptMessageType]="''"
                (newPromptNameChange)="newPromptName.set($event)"
                (newPromptTextChange)="newPromptText.set($event)"
                (createPrompt)="createPrompt()"
                (editPrompt)="startEditPrompt($event)"
                (deletePrompt)="deletePrompt($event)">
            </app-prompt-manager>
            @if (editingPromptId()) {
            <div class="mt-3">
                <button class="btn btn-ghost btn-sm" type="button"
                    (click)="cancelEditPrompt()">
                    Cancelar edición
                </button>
            </div>
            }
        </div>
    </div>
</section>
