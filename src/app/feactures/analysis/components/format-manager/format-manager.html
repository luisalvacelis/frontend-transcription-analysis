<article class="rounded-2xl border border-base-200 bg-base-100 p-5 shadow-sm">
    <h2 class="text-lg font-bold text-base-content">Crear Formato de Salida</h2>
    <div class="mt-4 space-y-3">
        <input
            class="input input-bordered w-full bg-base-100 analysis-neon-control"
            placeholder="Nombre"
            [ngModel]="newFormatName"
            (ngModelChange)="newFormatNameChange.emit($event)" />
        <input
            class="input input-bordered w-full bg-base-100 analysis-neon-control"
            placeholder="Campos separados por coma"
            [ngModel]="newFormatFields"
            (ngModelChange)="newFormatFieldsChange.emit($event)" />
        <textarea
            class="textarea textarea-bordered w-full h-24 bg-base-100 analysis-neon-control"
            placeholder="Descripcion"
            [ngModel]="newFormatDescription"
            (ngModelChange)="newFormatDescriptionChange.emit($event)"></textarea>
        <select
            class="select select-bordered w-full bg-base-100 analysis-neon-control"
            [ngModel]="selectedMetadataExtractionType"
            (ngModelChange)="selectedMetadataExtractionTypeChange.emit($event)">
            @for (item of metadataExtractionTypes; track item.id) {
            <option [value]="item.id">{{ item.name }}</option>
            }
        </select>
        <textarea
            class="textarea textarea-bordered w-full h-40 bg-base-100 font-mono text-xs analysis-neon-control"
            placeholder='{"metadata_columns":[{"column":"DNI_EVALUADOR","source":"audio","field":"dni_evaluador"}],"observation_groups":[{"from":1,"to":16,"column":"observaciones_1_al_16","include_evaluations":["No cumple"]}],"transcription":{"enabled":true,"chunk_size":32000,"column_prefix":"TRANSCRIPCION_LLAMADA"}}'
            [ngModel]="newFormatLayoutConfig"
            (ngModelChange)="newFormatLayoutConfigChange.emit($event)"></textarea>
        <button
            class="btn btn-primary w-full"
            [disabled]="working"
            (click)="createFormat.emit()">Guardar Formato</button>
        @if (formatMessage) {
        <div
            class="alert mt-3 py-3 text-sm shadow-sm"
            [class.alert-error]="formatMessageType === 'error'"
            [class.alert-success]="formatMessageType === 'success'">
            {{ formatMessage }}
        </div>
        }
    </div>

    <h3 class="mt-5 text-sm font-bold text-base-content">Formatos
        Registrados</h3>
    <div class="mt-2 max-h-48 space-y-2 overflow-y-auto pr-1">
        @for (format of formats; track format.id) {
        <div class="rounded-lg border border-base-200 bg-base-200/40 p-3">
            <div class="flex items-start justify-between gap-2">
                <strong class="text-sm text-base-content">{{ format.name
                    }}</strong>
                <button class="btn btn-xs btn-error"
                    (click)="deleteFormat.emit(format.id)">Eliminar</button>
            </div>
            <p class="mt-1 text-xs text-base-content/70 line-clamp-3">{{
                getFormatSummary(format) }}</p>
        </div>
        }
    </div>
</article>
